# This is a Databricks asset bundle definition for ins_sdp.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: ins_sdp
  uuid: 0d6969c0-4626-424f-8148-74cfeb3f39d3

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: Target Unity Catalog
  bronze_schema:
    description: Schema for bronze (Auto Loader ingest) tables
  silver_schema:
    description: Schema for silver (cleaned / CDC-applied) tables
  gold_schema:
    description: Schema for gold (conformed dims / SCD current+history) tables
  volume_base:
    description: Root volume path holding the synthetic source data

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-3831d057-2b76.cloud.databricks.com
    variables:
      catalog: insurance_sdp
      bronze_schema: bronze
      silver_schema: silver
      gold_schema: gold
      volume_base: /Volumes/insurance_sdp/raw/brand_raw
  prod:
    mode: production
    workspace:
      host: https://dbc-3831d057-2b76.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/iyengarbalram97@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/iyengarbalram97@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: insurance_sdp
      bronze_schema: bronze
      silver_schema: silver
      gold_schema: gold
      volume_base: /Volumes/insurance_sdp/raw/brand_raw
    permissions:
      - user_name: iyengarbalram97@gmail.com
        level: CAN_MANAGE
